name: TestNova Frontend CI

on:
  push:
    paths:
      - 'testnova-ui/**'
  pull_request:
    paths:
      - 'testnova-ui/**'

defaults:
  run:
    working-directory: testnova-ui

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'testnova-ui/package-lock.json'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Linter
        run: npm run lint

      - name: Verify Build
        run: npm run build
